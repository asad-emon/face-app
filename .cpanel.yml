---
deployment:
  tasks:
    # Define destination paths (cPanel typically uses /home/username/...)
    - export DEPLOYPATH=/home/$(whoami)/face-app/client
    - export APIPATH=/home/$(whoami)/face-app/api
    
    # 1. Deploy Frontend
    # Copies the contents of the built dist folder to client directory on the server
    - cd client
    - /bin/npm install
    - /bin/npm run build
    - /bin/cp -R dist/* $DEPLOYPATH
    
    # 2. Deploy Backend API
    - cd ../api
    - /bin/cp -R src $APIPATH
    - /bin/cp package.json $APIPATH
    - /bin/cp package-lock.json $APIPATH
