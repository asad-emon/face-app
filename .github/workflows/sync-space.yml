name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync-to-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # important for big files (models, datasets)

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          REPO_ID: ${{ secrets.REPO_ID }} # format: username/space-name
        run: |
          set -e

          # Clone the Space repository into a clean directory
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$REPO_ID space-repo

          # Sync contents of inference/ into Space root
          # (e.g., inference/app.py -> app.py in the Space repo)
          rsync -av --delete inference/ space-repo/

          cd space-repo

          # Commit only when there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync Space root from inference/"
            git push origin main
          else
            echo "No changes to sync from inference/."
          fi
